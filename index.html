<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAPTAIN AMERICA — FOD MISSION</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&family=Noto+Sans+Gujarati:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #060810;
  --dark:      #0c1020;
  --panel:     rgba(15,21,37,0.82);
  --surface:   rgba(20,29,48,0.80);
  --blue:      #1e6bc4;
  --blue-l:    #3a8fec;
  --blue-glow: rgba(58,143,236,0.25);
  --red:       #c0271a;
  --red-l:     #e8402e;
  --gold:      #d4a017;
  --gold-l:    #f5c842;
  --white:     #e8f0ff;
  --grey:      #4a5580;
  --star:      rgba(255,255,255,0.06);
  --mono:      'Share Tech Mono', monospace;
  --display:   'Bebas Neue', 'Oswald', sans-serif;
  --body:      'Oswald', sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}

body {
  background-color: #060810;
  color: var(--white);
  font-family: var(--body);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ── CAP BACKGROUND — fixed full image, dimmed ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url('https://w0.peakpx.com/wallpaper/592/895/HD-wallpaper-captain-america-amoled-cool-marvel.jpg');
  background-size: cover;
  background-position: center top;
  background-repeat: no-repeat;
  filter: brightness(0.18) saturate(1.6) hue-rotate(-8deg);
  z-index: 0;
  pointer-events: none;
}

/* ── ATMOSPHERIC OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(180deg,
      rgba(4,6,14,0.60) 0%,
      rgba(4,6,14,0.05) 25%,
      rgba(4,6,14,0.05) 65%,
      rgba(4,6,14,0.80) 100%
    ),
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(30,107,196,0.18) 0%, transparent 100%),
    radial-gradient(ellipse 50% 30% at 50% 100%, rgba(192,39,26,0.10) 0%, transparent 100%);
  z-index: 1;
  pointer-events: none;
}

.wrapper {
  position:relative;
  z-index:2;
  max-width:840px;
  margin:0 auto;
  padding:0 16px 80px;
}

/* ── HEADER ── */
.site-header {
  text-align:center;
  padding:40px 0 32px;
  position:relative;
}

.header-eyebrow {
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:5px;
  color:var(--blue-l);
  margin-bottom:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.eyebrow-line {
  flex:1;
  max-width:80px;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--blue-l));
}

.eyebrow-line.right {
  background:linear-gradient(90deg,var(--blue-l),transparent);
}

/* ── SHIELD LOGO ── */
.shield-wrap {
  width:120px;
  height:120px;
  margin:0 auto 20px;
  position:relative;
  animation:shieldFloat 4s ease-in-out infinite;
}

@keyframes shieldFloat {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

.shield-svg {
  width:100%;
  height:100%;
  filter:drop-shadow(0 0 20px rgba(30,107,196,0.5));
}

.shield-ring {
  position:absolute;
  inset:-15px;
  border-radius:50%;
  border:1px solid rgba(58,143,236,0.2);
  animation:ringPulse 2s ease-in-out infinite;
}

.shield-ring:nth-child(2) {
  inset:-25px;
  animation-delay:0.5s;
  border-color:rgba(58,143,236,0.1);
}

@keyframes ringPulse {
  0%,100%{transform:scale(1);opacity:1;}
  50%{transform:scale(1.05);opacity:0.5;}
}

.site-title {
  font-family:'Bebas Neue', sans-serif;
  font-size:clamp(52px,14vw,110px);
  letter-spacing:10px;
  line-height:0.9;
  color:var(--white);
  text-shadow:0 0 60px rgba(58,143,236,0.5), 0 2px 0 rgba(0,0,0,0.5);
  margin-bottom:6px;
  text-transform:uppercase;
}

.site-title .red { color:var(--red-l); text-shadow:0 0 30px rgba(232,64,46,0.4); }
.site-title .blue { color:var(--blue-l); text-shadow:0 0 30px rgba(58,143,236,0.5); }

.site-sub {
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:5px;
  color:var(--blue-l);
  margin-top:14px;
  opacity:0.7;
}

/* ── STATUS BAR ── */
.status-bar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(6,10,24,0.28);
  border:1px solid rgba(58,143,236,0.18);
  border-left:3px solid var(--blue-l);
  padding:10px 16px;
  margin:28px 0 6px;
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:1px;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-radius:30px;
}

#status-text { color:var(--blue-l); }

/* ── PROGRESS ── */
.progress-wrap {
  height:4px;
  background:rgba(58,143,236,0.10);
  margin-bottom:6px;
  overflow:hidden;
  position:relative;
  border-radius:4px;
}

#progress-fill {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--blue),var(--blue-l));
  transition:width 0.8s ease;
  box-shadow:0 0 12px var(--blue-glow);
}

.progress-label {
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:2px;
  color:var(--grey);
  text-align:right;
  margin-bottom:24px;
}

#progress-count { color:var(--blue-l); }

/* ── NEXT CLUE BAR ── */
.next-clue-bar {
  display:none;
  align-items:center;
  gap:10px;
  background:rgba(6,10,24,0.22);
  border:1px solid rgba(58,143,236,0.14);
  padding:8px 18px;
  margin-bottom:24px;
  font-family:var(--mono);
  font-size:11px;
  color:var(--grey);
  border-radius:30px;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

.ncb-dot {
  width:7px;height:7px;
  border-radius:50%;
  background:var(--red-l);
  animation:pulse 1.2s ease infinite;
  box-shadow:0 0 6px var(--red-l);
  flex-shrink:0;
}

@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(0.6);opacity:0.4;}}
#ncb-timer{color:var(--gold-l);font-weight:bold;margin-left:auto;font-size:14px;}

/* ── MISSION CARDS ── */
.missions-stack {
  display:flex;
  flex-direction:column;
  gap:3px;
}

.mission-card {
  border-left:4px solid transparent;
  transition:all 0.5s;
  animation:fadeUp 0.6s both;
  border-radius:0 16px 16px 0;
  overflow:hidden;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

.mission-card.locked {
  background:rgba(6,8,16,0.30);
  border-left-color:rgba(58,143,236,0.12);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-radius:0 14px 14px 0;
}

.mission-card.unlocked {
  background:rgba(15,22,42,0.35);
  border-left-color:var(--blue-l);
  box-shadow:-2px 0 24px rgba(58,143,236,0.20),inset 0 0 30px rgba(58,143,236,0.05);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-radius:0 14px 14px 0;
}

@keyframes missionReveal {
  0%{opacity:0;transform:translateX(-12px);border-left-color:var(--gold-l);}
  40%{border-left-color:var(--red-l);}
  100%{opacity:1;transform:translateX(0);border-left-color:var(--blue-l);}
}

.mission-inner {
  display:grid;
  grid-template-columns:60px 1fr 36px;
  align-items:center;
  min-height:80px;
}

.mission-num {
  font-family:var(--display);
  font-size:9px;
  letter-spacing:2px;
  color:var(--grey);
  text-align:center;
  padding:0 8px;
  border-right:1px solid rgba(255,255,255,0.04);
  writing-mode:vertical-rl;
  transform:rotate(180deg);
  user-select:none;
  line-height:1.2;
}

.mission-card.unlocked .mission-num { color:var(--blue-l); }

.mission-content { padding:16px 20px; }

.mission-tag {
  font-family:var(--mono);
  font-size:8px;
  letter-spacing:3px;
  color:var(--grey);
  margin-bottom:8px;
  text-transform:uppercase;
}

.mission-card.unlocked .mission-tag { color:rgba(58,143,236,0.6); }

.mission-text {
  font-family:'Noto Sans Gujarati',var(--body);
  font-size:15px;
  font-weight:600;
  line-height:1.6;
  color:#2a3555;
  font-style:italic;
}

.mission-card.unlocked .mission-text {
  color:var(--white);
  font-style:normal;
  font-family:var(--body);
}

.mission-lock {
  font-size:16px;
  text-align:center;
  padding-right:14px;
  color:#1a2040;
  transition:color 0.4s;
}

.mission-card.unlocked .mission-lock { color:var(--blue-l); }

/* ── REVEAL SECTION ── */
.reveal-section {
  margin-top:52px;
  text-align:center;
}

.reveal-label {
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:5px;
  color:var(--grey);
  margin-bottom:24px;
}

/* Big shield reveal */
.big-shield-wrap {
  width:140px;
  height:140px;
  margin:0 auto 28px;
  position:relative;
}

.big-shield {
  width:100%;
  height:100%;
  filter:grayscale(1) brightness(0.3);
  transition:filter 1.5s ease, transform 0.5s ease;
}

.big-shield.revealed {
  filter:grayscale(0) brightness(1) drop-shadow(0 0 30px rgba(58,143,236,0.6));
  transform:scale(1.05);
}

/* Reveal lock bar */
.reveal-lock-bar {
  background:rgba(6,10,24,0.28);
  border:1px solid rgba(58,143,236,0.15);
  border-left:3px solid rgba(58,143,236,0.3);
  padding:14px 22px;
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:20px;
  text-align:left;
  border-radius:20px;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}

.rlb-icon { font-size:24px; }

.rlb-title {
  font-family:var(--display);
  font-size:15px;
  letter-spacing:2px;
  color:var(--white);
}

.rlb-sub {
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:2px;
  color:var(--grey);
  margin-top:3px;
}

/* Reveal button */
.btn-reveal {
  font-family:var(--display);
  font-size:18px;
  letter-spacing:3px;
  padding:16px 40px;
  border:none;
  cursor:pointer;
  width:100%;
  max-width:400px;
  transition:all 0.3s;
  position:relative;
  overflow:hidden;
  border-radius:50px;
}

.btn-reveal.reveal-locked {
  background:rgba(6,10,24,0.30);
  color:var(--grey);
  border:1px solid rgba(58,143,236,0.15);
  cursor:not-allowed;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

.btn-reveal.reveal-ready {
  background:linear-gradient(135deg,var(--blue),var(--red));
  color:var(--white);
  box-shadow:0 0 30px rgba(58,143,236,0.3),0 0 60px rgba(192,39,26,0.2);
}

.btn-reveal.reveal-ready:hover {
  transform:translateY(-2px);
  box-shadow:0 0 50px rgba(58,143,236,0.5),0 0 80px rgba(192,39,26,0.3);
}

.reveal-timer {
  font-family:var(--mono);
  font-size:13px;
  color:var(--gold-l);
  margin-top:10px;
  letter-spacing:2px;
}

/* ── REVEAL PANEL ── */
.reveal-panel {
  display:none;
  margin-top:32px;
  background:rgba(6,10,24,0.30);
  border:1px solid rgba(58,143,236,0.28);
  border-left:4px solid var(--blue-l);
  padding:32px 28px;
  text-align:left;
  animation:panelDrop 0.8s cubic-bezier(0.175,0.885,0.32,1.275) both;
  position:relative;
  overflow:hidden;
  border-radius:20px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}

.reveal-panel::before {
  content:'A';
  font-family:var(--display);
  font-size:300px;
  color:rgba(58,143,236,0.03);
  position:absolute;
  right:-30px;
  top:-60px;
  line-height:1;
  pointer-events:none;
}

.reveal-panel.show { display:block; }

@keyframes panelDrop {
  from{opacity:0;transform:translateY(-20px);}
  to{opacity:1;transform:translateY(0);}
}

.reveal-codename {
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:4px;
  color:var(--blue-l);
  margin-bottom:6px;
}

.reveal-name {
  font-family:var(--display);
  font-size:clamp(36px,10vw,68px);
  color:var(--white);
  letter-spacing:3px;
  line-height:1;
  text-shadow:0 0 40px rgba(58,143,236,0.4);
  margin-bottom:4px;
}

.reveal-alias {
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:4px;
  color:var(--gold-l);
  margin-bottom:24px;
}

.reveal-body {
  font-size:16px;
  font-weight:600;
  line-height:1.8;
  color:var(--white);
  border-top:1px solid rgba(58,143,236,0.15);
  padding-top:20px;
  position:relative;
  z-index:1;
}

.reveal-body .guj {
  font-family:'Noto Sans Gujarati',sans-serif;
  font-size:14px;
}

/* ── CONFETTI ── */
.confetti-burst{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}
.confetti-piece{position:absolute;top:-20px;animation:fall linear both;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}

/* ── RESPONSIVE ── */
@media(max-width:500px) {
  .mission-inner{grid-template-columns:44px 1fr 28px;}
  .mission-text{font-size:14px;}
  .shield-wrap{width:90px;height:90px;}
}
</style>
</head>

// ── DECODE ──
const _k1="ARAWA",_k2="LI201",_k3="7JAYLO";
function _decode(enc){
  const K=(_k1+_k2+_k3).split("").map(c=>c.charCodeAt(0));
  const raw=atob(enc);
  const bytes=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i);
  const rev=bytes.reverse();
  const out=[];
  for(let i=0;i<rev.length;i++) out.push(rev[i]^K[i%K.length]);
  return new TextDecoder().decode(new Uint8Array(out));
}

const total=_meta.length;
let revealed=0;

// ── SERVER TIME ──
let _offset=0,_timeReady=false;

async function syncServerTime(){
  const apis=[
    "https://worldtimeapi.org/api/timezone/Asia/Kolkata",
    "https://timeapi.io/api/time/current/zone?timeZone=Asia/Kolkata"
  ];
  for(const url of apis){
    try{
      const before=Date.now();
      const res=await fetch(url,{cache:"no-store"});
      const after=Date.now();
      const data=await res.json();
      const serverMs=data.unixtime?data.unixtime*1000:new Date(data.dateTime).getTime();
      _offset=serverMs-Math.round((before+after)/2);
      _timeReady=true;
      return;
    }catch(_){}
  }
  _offset=0;_timeReady=true;
}

function realNow(){return Date.now()+_offset;}

function getClueUnlockMs(i){
  const b=new Date(realNow());
  b.setHours(GAME_START.h,GAME_START.m,GAME_START.s,0);
  return b.getTime()+i*CLUE_INTERVAL_SEC*1000;
}

function getRevealUnlockMs(){
  const t=new Date(realNow());
  t.setHours(REVEAL_HOUR,REVEAL_MIN,0,0);
  return t.getTime();
}

function getRevealedCountNow(){
  const now=realNow();let c=0;
  for(let i=0;i<total;i++){if(now>=getClueUnlockMs(i))c++;else break;}
  return c;
}

function getMsUntilReveal(){return Math.max(0,getRevealUnlockMs()-realNow());}
function pad(n){return String(n).padStart(2,"0");}

// ── BUILD CARDS ──
function buildMissions(){
  const stack=document.getElementById("missions-stack");
  stack.innerHTML="";
  _meta.forEach((c,i)=>{
    const div=document.createElement("div");
    div.className="mission-card locked";
    div.id="mission-"+i;
    div.style.animationDelay=(i*0.08)+"s";
    div.innerHTML=
      '<div class="mission-inner">'+
        '<div class="mission-num">M-'+(i+1)+'</div>'+
        '<div class="mission-content">'+
          '<div class="mission-tag">'+c.tag+'</div>'+
          '<div class="mission-text" id="mission-text-'+i+'">[ CLASSIFIED — AWAITING AUTHORISATION ]</div>'+
        '</div>'+
        '<div class="mission-lock" id="mission-lock-'+i+'">🔒</div>'+
      '</div>';
    stack.appendChild(div);
  });
}

// ── REVEAL ──
function revealMission(index,animate){
  if(index>=total)return;
  const card=document.getElementById("mission-"+index);
  if(!card||card.classList.contains("unlocked"))return;
  const textEl=document.getElementById("mission-text-"+index);
  const lockEl=document.getElementById("mission-lock-"+index);
  card.classList.remove("locked");
  card.classList.add("unlocked");
  if(animate){
    card.style.animation="none";card.offsetHeight;
    card.style.animation="missionReveal 0.7s cubic-bezier(0.175,0.885,0.32,1.275) both";
  }
  textEl.textContent=_decode(_meta[index]._d);
  lockEl.textContent="✅";
}

function updateProgress(count){
  document.getElementById("progress-fill").style.width=(count/total*100)+"%";
  document.getElementById("progress-count").textContent=count+" / "+total;
}

// ── TICK ──
function tick(){
  if(!_timeReady)return;
  const count=getRevealedCountNow();
  if(count>revealed){
    for(let i=revealed;i<count;i++) revealMission(i,count===revealed+1);
    revealed=count;updateProgress(revealed);
  }
  const bar=document.getElementById("next-clue-bar");
  const statusEl=document.getElementById("status-text");
  if(revealed>=total){
    bar.style.display="none";
    statusEl.textContent="ALL MISSIONS UNLOCKED — AWAITING 5:45 PM REVEAL!";
  } else {
    const msLeft=Math.max(0,getClueUnlockMs(revealed)-realNow());
    const secs=Math.ceil(msLeft/1000);
    bar.style.display="flex";
    document.getElementById("ncb-timer").textContent=Math.floor(secs/60)+":"+pad(secs%60);
    statusEl.textContent="MISSION "+revealed+" OF "+total+" UNLOCKED — IDENTIFY THE CAPTAIN!";
  }
  const msReveal=getMsUntilReveal();
  const btn=document.getElementById("btn-reveal-final");
  const timerEl=document.getElementById("reveal-timer");
  if(msReveal<=0){
    btn.disabled=false;
    btn.classList.remove("reveal-locked");
    btn.classList.add("reveal-ready");
    btn.innerHTML="🛡️ REVEAL THE CAPTAIN ⚡";
    if(timerEl)timerEl.style.display="none";
  } else {
    const t=Math.floor(msReveal/1000);
    btn.disabled=true;
    btn.classList.add("reveal-locked");
    btn.classList.remove("reveal-ready");
    btn.innerHTML="🔒 IDENTITY LOCKED — 5:45 PM";
    if(timerEl)timerEl.textContent=pad(Math.floor(t/3600))+":"+pad(Math.floor((t%3600)/60))+":"+pad(t%60);
  }
}

function finalReveal(){
  if(getMsUntilReveal()>0)return;
  // Animate shield then redirect
  document.getElementById("big-shield").classList.add("revealed");
  document.getElementById("status-text").textContent="🎉 CAPTAIN IDENTIFIED — REDIRECTING...";
  spawnConfetti();
  setTimeout(function(){ window.location.href="ca.html"; }, 1800);
}

function spawnConfetti(){
  const colors=["#1e6bc4","#c0271a","#d4a017","#ffffff","#3a8fec","#e8402e"];
  const burst=document.createElement("div");
  burst.className="confetti-burst";
  document.body.appendChild(burst);
  for(let i=0;i<100;i++){
    const p=document.createElement("div");
    p.className="confetti-piece";
    p.style.cssText="left:"+(Math.random()*100)+"%;background:"+colors[Math.floor(Math.random()*colors.length)]+";animation-duration:"+(1.5+Math.random()*2)+"s;animation-delay:"+(Math.random()*0.8)+"s;width:"+(5+Math.random()*8)+"px;height:"+(5+Math.random()*8)+"px;border-radius:"+(Math.random()>.5?"50%":"2px")+";";
    burst.appendChild(p);
  }
  setTimeout(()=>burst.remove(),4000);
}

// ── BOOT ──
buildMissions();
syncServerTime().then(()=>{
  const init=getRevealedCountNow();
  for(let i=0;i<init;i++) revealMission(i,false);
  revealed=init;updateProgress(revealed);
  tick();setInterval(tick,1000);
});
</script>
